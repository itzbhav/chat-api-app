name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: pytest tests/ -v

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Build Docker Image
        run: docker build -t bhavs143/chat-api:${{ github.sha }} .

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bhavs143/chat-api:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

      - name: Snyk Dependency Scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker Image
        run: |
          docker push bhavs143/chat-api:${{ github.sha }}
          docker tag bhavs143/chat-api:${{ github.sha }} bhavs143/chat-api:latest
          docker push bhavs143/chat-api:latest

      - name: Update Config Repo Image Tag
        run: |
          git config --global user.email "ci-bot@github.com"
          git config --global user.name "CI Bot"
          git clone https://x-access-token:${{ secrets.CONFIG_REPO_TOKEN }}@github.com/itzbhav/chat-api-config.git
          cd chat-api-config
          sed -i "s|image: bhavs143/chat-api:.*|image: bhavs143/chat-api:${{ github.sha }}|g" manifests/deployment.yaml
          git add .
          git commit -m "CI: update image tag to ${{ github.sha }}"
          git push 